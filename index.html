<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PigTracker">
<meta name="theme-color" content="#070e1c">
<link rel="manifest" href="manifest.json">
<title>PigTracker V2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #070e1c;
  --bg2:     #0d1a2e;
  --bg3:     #122038;
  --border:  #1e3050;
  --border2: #2a4268;
  --accent:  #0ea5e9;
  --accent2: #38bdf8;
  --success: #10b981;
  --warn:    #f59e0b;
  --danger:  #ef4444;
  --text:    #e2eaf6;
  --muted:   #6b8ab0;
  --mono:    'IBM Plex Mono', monospace;
  --sans:    'IBM Plex Sans', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}

.app{display:grid;grid-template-rows:44px auto 1fr;height:100vh;height:100dvh}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.logo{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:2px;color:var(--accent)}
.logo span{color:var(--muted);font-weight:300}
#clock{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px}

/* BLE bar */
.ble-bar{display:flex;align-items:center;gap:8px;padding:7px 14px;background:var(--bg3);border-bottom:1px solid var(--border)}
.ble-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
.ble-dot.on{background:var(--success);animation:blink 2s infinite}
.ble-dot.err{background:var(--danger)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.ble-status{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.5px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn{font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:5px 10px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.btn:disabled{opacity:.3;cursor:default}
.btn.connected{border-color:var(--success);color:var(--success)}

/* Body layout */
.body{display:grid;overflow:hidden}
@media(min-width:680px){.body{grid-template-columns:1fr 300px}}
@media(max-width:679px){.body{grid-template-rows:auto 1fr}}

/* Panel izquierdo */
.left{display:flex;flex-direction:column;overflow:hidden}
.live{padding:10px 14px 8px;border-bottom:1px solid var(--border);flex-shrink:0}

/* Métricas */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);margin-bottom:8px;border-radius:4px;overflow:hidden}
.metric{background:var(--bg2);padding:6px 8px}
.metric-label{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
.metric-value{font-family:var(--mono);font-size:15px;font-weight:600;line-height:1}
.ok{color:var(--success)}.warn{color:var(--warn)}.err{color:var(--danger)}

/* Ventanas mini */
.windows{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.win{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:5px 5px 3px}
.win.best{border-color:var(--accent);background:#0c1d34}
.win-title{font-family:var(--mono);font-size:8px;color:var(--muted);margin-bottom:3px;display:flex;justify-content:space-between}
.win-title b{color:var(--accent2);font-weight:600}
.cv{position:relative;height:65px}
.cv canvas{width:100%!important;height:100%!important}

/* Progress */
.dl-prog{height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin-top:6px;opacity:0;transition:opacity .3s}
.dl-prog.active{opacity:1}
.dl-bar{height:100%;background:var(--accent);width:0;transition:width .4s}

/* Historial */
.hist{flex:1;overflow-y:auto;padding:8px 14px}
.hist-hdr{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.hist-count{color:var(--accent);font-size:9px}
.hist-list{display:flex;flex-direction:column;gap:3px}
.hist-item{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:7px 10px;cursor:pointer;transition:border-color .15s;display:flex;justify-content:space-between;align-items:center;gap:8px}
.hist-item:hover{border-color:var(--border2)}
.hist-item.sel{border-color:var(--accent);background:#0d1e35}
.hist-ts{font-family:var(--mono);font-size:10px;color:var(--text)}
.hist-m{font-family:var(--mono);font-size:8px;color:var(--muted);margin-top:2px}
.hist-badge{font-family:var(--mono);font-size:8px;padding:2px 5px;border-radius:3px;border:1px solid var(--success);color:var(--success);white-space:nowrap;flex-shrink:0}
.hist-empty{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:center;padding:20px;letter-spacing:.5px}

/* Panel derecho detalle */
.right{border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--bg2)}
@media(max-width:679px){.right{border-left:none;border-top:1px solid var(--border);height:260px;flex-shrink:0}}
.detail-hdr{padding:10px 14px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
.detail-label{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
.detail-ts{font-family:var(--mono);font-size:10px;color:var(--text)}
.detail-body{flex:1;overflow:hidden;padding:8px 14px;display:flex;flex-direction:column;gap:6px}
.detail-metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:3px}
.dm{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:5px 7px}
.dm-label{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:1px;margin-bottom:1px}
.dm-value{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent)}
.detail-fft{flex:1;position:relative;min-height:60px}
.detail-gps{font-family:var(--mono);font-size:8px;color:var(--muted)}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px}
.placeholder::before{content:'';display:block;width:24px;height:1px;background:var(--border2)}

/* Scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="app">

<header class="header">
  <div class="logo">PigTracker <span>// V2</span></div>
  <div id="clock">--:--:--</div>
</header>

<div class="ble-bar">
  <div class="ble-dot" id="bleDot"></div>
  <div class="ble-status" id="bleStatus">DEMO — conectá el PigTracker por BLE</div>
  <button class="btn" id="dlBtn" onclick="descargarHistorial()" disabled>↓ HIST</button>
  <button class="btn" id="bleBtn" onclick="toggleBLE()">CONECTAR</button>
</div>

<div class="body">

  <!-- Panel izquierdo -->
  <div class="left">
    <div class="live">
      <div class="metrics">
        <div class="metric"><div class="metric-label">Frec.</div><div class="metric-value" id="mFreq">— Hz</div></div>
        <div class="metric"><div class="metric-label">Mag</div><div class="metric-value" id="mMag">—</div></div>
        <div class="metric"><div class="metric-label">SNR</div><div class="metric-value" id="mSnr">—</div></div>
        <div class="metric"><div class="metric-label">Detección</div><div class="metric-value err" id="mDet">NO</div></div>
      </div>
      <div class="windows">
        <div class="win" id="wc0"><div class="win-title">V1/3 <b id="b0">— Hz</b></div><div class="cv"><canvas id="c0"></canvas></div></div>
        <div class="win" id="wc1"><div class="win-title">V2/3 <b id="b1">— Hz</b></div><div class="cv"><canvas id="c1"></canvas></div></div>
        <div class="win" id="wc2"><div class="win-title">V3/3 <b id="b2">— Hz</b></div><div class="cv"><canvas id="c2"></canvas></div></div>
      </div>
      <div class="dl-prog" id="dlProg"><div class="dl-bar" id="dlBar"></div></div>
    </div>
    <div class="hist">
      <div class="hist-hdr"><span>Historial</span><span class="hist-count" id="hCount">0 registros</span></div>
      <div class="hist-list" id="hList"><div class="hist-empty" id="hEmpty">Sin detecciones guardadas</div></div>
    </div>
  </div>

  <!-- Panel derecho -->
  <div class="right">
    <div class="detail-hdr">
      <div class="detail-label">Detalle de detección</div>
      <div class="detail-ts" id="dTs">—</div>
    </div>
    <div class="detail-body">
      <div class="detail-metrics" id="dMetrics" style="display:none">
        <div class="dm"><div class="dm-label">MAGNITUD</div><div class="dm-value" id="dMag">—</div></div>
        <div class="dm"><div class="dm-label">SNR</div><div class="dm-value" id="dSnr">—</div></div>
        <div class="dm"><div class="dm-label">RATIO</div><div class="dm-value" id="dRatio">—</div></div>
        <div class="dm"><div class="dm-label">FRECUENCIA</div><div class="dm-value" id="dFreq">—</div></div>
      </div>
      <div class="detail-fft">
        <canvas id="cDetail"></canvas>
        <div class="placeholder" id="dPlaceholder"><span>Seleccioná una detección</span></div>
      </div>
      <div class="detail-gps" id="dGps"></div>
    </div>
  </div>

</div>
</div>

<script>
'use strict';

// ── Constantes ──
const SVC_UUID       = '12345678-1234-1234-1234-123456789abc';
const CHAR_FFT_UUID  = 'abcd1234-ab12-cd34-ef56-abcdef123456';
const CHAR_HIST_UUID = 'abcd1234-ab12-cd34-ef56-abcdef123457';
const N_BINS=32, BIN_RES=150/64, TARGET=22;
const BIN_LO=Math.max(1,Math.round((TARGET-2.5)/BIN_RES));
const BIN_HI=Math.min(N_BINS-1,Math.round((TARGET+2.5)/BIN_RES));
const BIN_TGT=Math.round(TARGET/BIN_RES);
const LABELS=Array.from({length:N_BINS},(_,i)=>(i*BIN_RES).toFixed(1));

// ── Estado ──
let bleDevice=null,charFFT=null,charHist=null;
let connected=false,isDemo=true;
let spectra=[new Float32Array(N_BINS),new Float32Array(N_BINS),new Float32Array(N_BINS)];
let bestWin=0,demoPhase=0,lastDemoUpd=[0,0,0];
let historial=[],selectedIdx=-1;
let dlTotal=0;

// ── IndexedDB ──
const DB='pigtracker',STORE='hist';
let db=null;
(async()=>{
  db=await new Promise((r,j)=>{
    const q=indexedDB.open(DB,1);
    q.onupgradeneeded=e=>e.target.result.createObjectStore(STORE,{keyPath:'ts'});
    q.onsuccess=e=>r(e.target.result);
    q.onerror=j;
  }).catch(()=>null);
  if(!db)return;
  const items=await new Promise(r=>{
    const q=db.transaction(STORE,'readonly').objectStore(STORE).getAll();
    q.onsuccess=e=>r(e.target.result||[]);
    q.onerror=()=>r([]);
  });
  if(items.length){historial=items.sort((a,b)=>a.ts>b.ts?-1:1);renderHist();}
})();

function saveDB(items){
  if(!db)return;
  const tx=db.transaction(STORE,'readwrite'),st=tx.objectStore(STORE);
  items.forEach(i=>st.put(i));
}

// ── Plugin banda objetivo ──
const bandPlugin=id=>({id,beforeDraw(c){
  const{ctx,chartArea:{top,bottom},scales:{x}}=c;
  if(!x)return;
  const xL=x.getPixelForValue(BIN_LO),xH=x.getPixelForValue(BIN_HI),xT=x.getPixelForValue(BIN_TGT);
  ctx.save();
  ctx.fillStyle='rgba(14,165,233,0.10)';ctx.fillRect(xL,top,xH-xL,bottom-top);
  ctx.strokeStyle='rgba(14,165,233,0.4)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(xT,top);ctx.lineTo(xT,bottom);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
}});

const miniOpts=()=>({responsive:true,maintainAspectRatio:false,animation:false,
  plugins:{legend:{display:false},tooltip:{enabled:false}},
  scales:{x:{display:false},y:{display:false,min:0,max:800}}
});

// ── Charts mini ──
const COLS=['#0ea5e9','#38bdf8','#7dd3fc'];
const mCharts=COLS.map((c,w)=>new Chart(document.getElementById('c'+w),{
  type:'line',
  data:{labels:LABELS,datasets:[{data:new Array(N_BINS).fill(0),borderColor:c,borderWidth:1.2,pointRadius:0,fill:false,tension:0.3}]},
  options:miniOpts(),
  plugins:[bandPlugin('b'+w)]
}));

// ── Chart detalle ──
const cDetail=new Chart(document.getElementById('cDetail'),{
  type:'line',
  data:{labels:LABELS,datasets:[
    {data:new Array(N_BINS).fill(0),borderColor:'#0ea5e9',borderWidth:1.8,pointRadius:0,fill:true,backgroundColor:'rgba(14,165,233,0.08)',tension:0.3},
    {data:new Array(N_BINS).fill(null),borderWidth:0,pointRadius:5,pointBackgroundColor:'#f59e0b',pointBorderColor:'#070e1c',pointBorderWidth:1.5,fill:false,showLine:false}
  ]},
  options:{
    responsive:true,maintainAspectRatio:false,animation:false,
    plugins:{legend:{display:false},tooltip:{
      backgroundColor:'#0d1a2e',borderColor:'#1e3050',borderWidth:1,
      titleColor:'#6b8ab0',bodyColor:'#0ea5e9',
      titleFont:{family:'IBM Plex Mono',size:9},bodyFont:{family:'IBM Plex Mono',size:10},
      callbacks:{title:i=>(i[0].dataIndex*BIN_RES).toFixed(2)+' Hz',label:i=>i.datasetIndex===0?' mag: '+i.raw.toFixed(1):null,filter:i=>i.datasetIndex===0}
    }},
    scales:{
      x:{grid:{color:'#1e3050'},ticks:{color:'#6b8ab0',font:{family:'IBM Plex Mono',size:8},maxTicksLimit:8,maxRotation:0,callback:(v,i)=>i%4===0?Math.round(i*BIN_RES):''},border:{color:'#1e3050'}},
      y:{min:0,max:800,grid:{color:'#1e3050'},ticks:{color:'#6b8ab0',font:{family:'IBM Plex Mono',size:8},maxTicksLimit:5,callback:v=>v>=1000?(v/1000).toFixed(0)+'k':v},border:{color:'#1e3050'}}
    }
  },
  plugins:[bandPlugin('bd')]
});

// ── Helpers ──
function bandE(s){let e=0;for(let i=BIN_LO;i<=BIN_HI;i++)e+=s[i]*s[i];return e;}
function findPk(arr,n=1){
  const ps=[];
  for(let i=1;i<arr.length-1;i++)if(arr[i]>arr[i-1]&&arr[i]>arr[i+1]&&arr[i]>30)ps.push({b:i,v:arr[i]});
  return ps.sort((a,b)=>b.v-a.v).slice(0,n);
}
function snr(s,b){let sm=0,c=0;for(let i=1;i<N_BINS;i++)if(Math.abs(i-b)>2){sm+=s[i];c++;}const n=c?sm/c:0.001;return n?(s[b]/n).toFixed(1):'—';}
function proc(raw,w){for(let i=0;i<N_BINS;i++)spectra[w][i]=spectra[w][i]*0.2+raw[i]*0.8;}

// ── Update live ──
function updateLive(){
  let maxE=-1;
  for(let w=0;w<3;w++){const e=bandE(spectra[w]);if(e>maxE){maxE=e;bestWin=w;}}
  for(let w=0;w<3;w++){
    mCharts[w].data.datasets[0].data=Array.from(spectra[w]);
    mCharts[w].update('none');
    const pk=findPk(spectra[w]);
    document.getElementById('b'+w).textContent=pk.length?(pk[0].b*BIN_RES).toFixed(1)+' Hz':'— Hz';
    document.getElementById('wc'+w).classList.toggle('best',w===bestWin);
  }
  const best=spectra[bestWin];
  const pks=findPk(best);
  if(pks.length){
    document.getElementById('mFreq').textContent=(pks[0].b*BIN_RES).toFixed(2)+' Hz';
    document.getElementById('mMag').textContent=pks[0].v.toFixed(0);
    document.getElementById('mSnr').textContent=snr(best,pks[0].b);
  }
}

// ── Demo ──
function demoW(w){
  demoPhase+=0.01;
  const out=new Float32Array(N_BINS);
  const a=[420,680,280];
  for(let i=1;i<N_BINS;i++){
    let v=a[w]*Math.exp(-Math.pow((i-BIN_TGT)/1.1,2));
    v+=150*Math.exp(-Math.pow((i-18)/2,2))+60*Math.random();
    out[i]=Math.max(0,v);
  }
  return out;
}

let lastCk=0;
function loop(ts){
  requestAnimationFrame(loop);
  if(ts-lastCk>500){
    lastCk=ts;
    document.getElementById('clock').textContent=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }
  if(!isDemo)return;
  for(let w=0;w<3;w++){
    if(ts-lastDemoUpd[w]>700+w*220){lastDemoUpd[w]=ts;proc(demoW(w),w);}
  }
  updateLive();
}
requestAnimationFrame(loop);

// ── BLE ──
async function toggleBLE(){
  if(connected){disconn();return;}
  try{
    setS('Buscando PigTracker...');
    bleDevice=await navigator.bluetooth.requestDevice({filters:[{name:'FFT-Analyzer'}],optionalServices:[SVC_UUID]});
    bleDevice.addEventListener('gattserverdisconnected',onDisc);
    setS('Conectando...');
    const srv=await bleDevice.gatt.connect();
    const svc=await srv.getPrimaryService(SVC_UUID);
    charFFT=await svc.getCharacteristic(CHAR_FFT_UUID);
    charHist=await svc.getCharacteristic(CHAR_HIST_UUID);
    await charFFT.startNotifications();
    charFFT.addEventListener('characteristicvaluechanged',onFFT);
    await charHist.startNotifications();
    charHist.addEventListener('characteristicvaluechanged',onHist);
    connected=true;isDemo=false;
    document.getElementById('bleDot').className='ble-dot on';
    document.getElementById('bleBtn').textContent='DESCONECTAR';
    document.getElementById('bleBtn').className='btn connected';
    document.getElementById('dlBtn').disabled=false;
    setS('Conectado — FFT-Analyzer');
  }catch(e){
    setS('Error: '+e.message);
    document.getElementById('bleDot').className='ble-dot err';
    setTimeout(()=>document.getElementById('bleDot').className='ble-dot',3000);
  }
}

function onFFT(e){
  const dv=e.target.value,type=dv.getUint8(0);
  if(type===0xFF){
    const ok=dv.getUint8(1)===1;
    const mag=(dv.getUint8(3)<<8)|dv.getUint8(4);
    const freq=((dv.getUint8(5)<<8)|dv.getUint8(6))/100;
    const sr=dv.getUint8(8)/10;
    document.getElementById('mMag').textContent=mag;
    document.getElementById('mSnr').textContent=sr.toFixed(1);
    document.getElementById('mFreq').textContent=freq.toFixed(2)+' Hz';
    const el=document.getElementById('mDet');
    el.textContent=ok?'SÍ':'NO';el.className='metric-value '+(ok?'ok':'err');
    return;
  }
  const w=type%3,raw=new Float32Array(N_BINS);
  for(let i=0;i<N_BINS;i++)raw[i]=(dv.getUint8(1+i*2)<<8)|dv.getUint8(2+i*2);
  proc(raw,w);updateLive();
}

// ── Protocolo historial ──
async function descargarHistorial(){
  if(!charHist||!connected)return;
  dlTotal=0;
  document.getElementById('dlProg').classList.add('active');
  document.getElementById('dlBar').style.width='0%';
  document.getElementById('dlBtn').disabled=true;
  setS('Solicitando historial...');
  await charHist.writeValue(new Uint8Array([0xA0]));
}

function onHist(e){
  const dv=e.target.value,cmd=dv.getUint8(0);
  if(cmd===0xA1){
    dlTotal=(dv.getUint8(1)<<8)|dv.getUint8(2);
    const idx=(dv.getUint8(3)<<8)|dv.getUint8(4);
    const json=new TextDecoder().decode(new Uint8Array(dv.buffer,5));
    try{
      const rec=JSON.parse(json.trim());
      const ex=historial.findIndex(h=>h.ts===rec.ts);
      if(ex===-1)historial.push(rec);else historial[ex]=rec;
    }catch(err){console.warn('JSON inválido',json);}
    const pct=dlTotal?Math.round((idx+1)/dlTotal*100):0;
    document.getElementById('dlBar').style.width=pct+'%';
    setS('Descargando: '+(idx+1)+'/'+dlTotal);
    charHist.writeValue(new Uint8Array([0xA2,dv.getUint8(3),dv.getUint8(4)]));
    return;
  }
  if(cmd===0xA3){
    const total=(dv.getUint8(1)<<8)|dv.getUint8(2);
    historial.sort((a,b)=>a.ts>b.ts?-1:1);
    saveDB(historial);renderHist();
    document.getElementById('dlProg').classList.remove('active');
    document.getElementById('dlBtn').disabled=false;
    setS('Historial listo — '+total+' detecciones');
  }
}

function onDisc(){
  connected=false;isDemo=true;charFFT=null;charHist=null;
  document.getElementById('bleDot').className='ble-dot';
  document.getElementById('bleBtn').textContent='RECONECTAR';
  document.getElementById('bleBtn').className='btn';
  document.getElementById('dlBtn').disabled=true;
  setS('Desconectado — modo demo');
}
function disconn(){if(bleDevice?.gatt?.connected)bleDevice.gatt.disconnect();onDisc();}
function setS(m){document.getElementById('bleStatus').textContent=m;}

// ── Historial UI ──
function formatTS(iso){
  try{
    const d=new Date(iso);
    const ar=new Date(d.getTime()-3*3600*1000);
    return ar.toISOString().replace('T',' ').substring(5,16)+' AR';
  }catch{return iso;}
}

function renderHist(){
  const list=document.getElementById('hList');
  const empty=document.getElementById('hEmpty');
  document.getElementById('hCount').textContent=historial.length+' registro'+(historial.length!==1?'s':'');
  if(!historial.length){empty.style.display='block';return;}
  empty.style.display='none';
  list.innerHTML='';
  historial.forEach((r,i)=>{
    const d=document.createElement('div');
    d.className='hist-item'+(i===selectedIdx?' sel':'');
    d.onclick=()=>selectDet(i);
    d.innerHTML=`<div>
      <div class="hist-ts">${formatTS(r.ts)}</div>
      <div class="hist-m">Mag: ${r.mag?.toFixed(0)||'—'}  SNR: ${r.snr?.toFixed(1)||'—'}  ${r.ratio?(r.ratio*100).toFixed(0)+'%':'—'}</div>
    </div>
    <div class="hist-badge">22 Hz</div>`;
    list.appendChild(d);
  });
}

function selectDet(i){
  selectedIdx=i;renderHist();
  const r=historial[i];if(!r)return;
  document.getElementById('dTs').textContent=formatTS(r.ts);
  document.getElementById('dMetrics').style.display='grid';
  document.getElementById('dMag').textContent=r.mag?.toFixed(0)||'—';
  document.getElementById('dSnr').textContent=r.snr?.toFixed(2)||'—';
  document.getElementById('dRatio').textContent=r.ratio?(r.ratio*100).toFixed(1)+'%':'—';
  document.getElementById('dFreq').textContent=r.freq?.toFixed(2)+' Hz'||'—';
  document.getElementById('dGps').textContent=r.lat&&r.lat!==0?`GPS: ${r.lat.toFixed(5)}, ${r.lon.toFixed(5)}`:'GPS: sin datos';
  document.getElementById('dPlaceholder').style.display='none';
  const fft=r.fft||[];
  const mx=Math.max(...fft,100);
  cDetail.options.scales.y.max=Math.ceil(mx*1.2);
  cDetail.data.datasets[0].data=fft;
  const pd=new Array(N_BINS).fill(null);
  let pb=BIN_LO,pv=0;
  for(let j=BIN_LO;j<=BIN_HI;j++){if(fft[j]>pv){pv=fft[j];pb=j;}}
  if(pv>0)pd[pb]=pv;
  cDetail.data.datasets[1].data=pd;
  cDetail.update('none');
}

// ── Service Worker ──
if('serviceWorker'in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
